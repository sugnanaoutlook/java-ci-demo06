name: PR Validation

on:
  push:
    branches: [ main, master, develop ]
    types: [ opened, synchronize, reopened, ready_for_review ]

permissions:
  contents: read
  checks: write
  pull-requests: write
  issues: write

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Validate PR metadata
  # ──────────────────────────────────────────────
  pr-check:
    name: PR Metadata Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            test
            chore
            perf
            ci
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The PR title must start with a lowercase letter.
            Example: "feat: add product search" or "fix: null pointer in cart service"

      - name: Check PR has description
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body;
            if (!body || body.trim().length < 20) {
              core.setFailed('PR description is required and must be at least 20 characters.');
            }

  # ──────────────────────────────────────────────
  # JOB 2: Build & Test
  # ──────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Compile
        run: mvn clean compile -q

      - name: Run unit tests
        run: mvn test

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/*.xml
          check_name: "Unit Test Results"
          comment_title: "Unit Test Results"
          fail_on: "test failures"

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-reports
          path: target/surefire-reports/
          retention-days: 7

  # ──────────────────────────────────────────────
  # JOB 3: Code Quality
  # ──────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Check for TODO / FIXME comments
        run: |
          echo "Scanning for TODO/FIXME comments..."
          COUNT=$(grep -rn --include="*.java" -E "TODO|FIXME" src/main/ | wc -l)
          echo "Found $COUNT TODO/FIXME comment(s) in main sources."
          if [ "$COUNT" -gt 10 ]; then
            echo "::warning::$COUNT TODO/FIXME comments found. Consider resolving them."
          fi

      - name: Verify build and run all checks
        run: mvn clean verify

  # ──────────────────────────────────────────────
  # JOB 4: PR Size Check
  # ──────────────────────────────────────────────
  pr-size:
    name: PR Size Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const additions = files.reduce((sum, f) => sum + f.additions, 0);
            const deletions = files.reduce((sum, f) => sum + f.deletions, 0);
            const changedFiles = files.length;
            const total = additions + deletions;

            console.log(`Files changed: ${changedFiles}`);
            console.log(`Lines added: ${additions}, deleted: ${deletions}, total: ${total}`);

            let label = 'size/S';
            if (total > 500) label = 'size/XL';
            else if (total > 200) label = 'size/L';
            else if (total > 100) label = 'size/M';

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [label],
            });

            if (total > 500) {
              core.warning(`This PR is very large (${total} lines changed across ${changedFiles} files). Consider breaking it into smaller PRs.`);
            }

  # ──────────────────────────────────────────────
  # JOB 5: Final status gate
  # ──────────────────────────────────────────────
  pr-ready:
    name: PR Ready to Merge
    runs-on: ubuntu-latest
    needs: [ pr-check, test, code-quality, pr-size ]
    if: always()

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check all jobs passed
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = ${{ toJSON(needs) }};
            const failed = Object.entries(jobs)
              .filter(([, v]) => v.result !== 'success')
              .map(([name]) => name);

            if (failed.length > 0) {
              core.setFailed(`The following validation jobs did not pass: ${failed.join(', ')}`);
            } else {
              console.log('All PR validation checks passed!');
            }
